name: Scrape CH bi-mensuel

on:
  schedule:
    - cron: '0 5 1,15 * *'  # 1er et 15 du mois à 5h UTC
  workflow_dispatch:

jobs:
  trigger-vercel:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel scrape-ch endpoint
        run: |
          curl -X POST \
            -H "Content-Type: application/json" \
            -H "User-Agent: GitHub-Actions-KARZ" \
            --max-time 600 \
            "https://karz-rho.vercel.app/api/scrape-ch"
