name: Scrape CH bi-mensuel

on:
  schedule:
    - cron: '0 5 1,15 * *'  # 1er et 15 du mois à 5h UTC
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Run scrape
        env:
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: node scrape-ch.js
