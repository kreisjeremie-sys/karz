name: Scrape EU hebdomadaire

on:
  schedule:
    - cron: '0 5 * * 1'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run EU scraper
        env:
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: node scrape-eu.js
